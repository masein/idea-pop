services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideapop
      POSTGRES_PASSWORD: ideapop
      POSTGRES_DB: ideapop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideapop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://ideapop:ideapop@postgres:5432/ideapop
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ideapop
      MINIO_ROOT_PASSWORD: ideapop123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - miniodata:/data

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:

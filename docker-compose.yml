services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideapop
      POSTGRES_PASSWORD: ideapop
      POSTGRES_DB: ideapop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideapop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://ideapop:ideapop@postgres:5432/ideapop
      RUST_LOG: info
      # Dev-only defaults so `just up` boots without extra setup.
      # Override per environment; NEVER use these values in production.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-at-least-32-bytes-long!!}
      RUN_MIGRATIONS: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* values are baked into the bundle at BUILD time —
        # they must be build args; runtime environment has no effect.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ideapop
      MINIO_ROOT_PASSWORD: ideapop123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - miniodata:/data

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:v2.53.1
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus_rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  miniodata:
  grafanadata:

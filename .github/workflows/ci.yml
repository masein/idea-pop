name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ideapop
          POSTGRES_PASSWORD: ideapop
          POSTGRES_DB: ideapop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ideapop:ideapop@localhost:5432/ideapop
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache sqlx-cli binary
        id: cache-sqlx-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: ${{ runner.os }}-sqlx-cli-0.9

      - name: Install sqlx-cli
        if: steps.cache-sqlx-cli.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run migrations
        run: cargo sqlx migrate run
        env:
          SQLX_OFFLINE: "false"

      - name: Verify SQLx offline cache
        run: cargo sqlx prepare --workspace --check
        env:
          SQLX_OFFLINE: "false"

      - name: Test with coverage
        run: cargo llvm-cov --all --lcov --output-path lcov.info
        env:
          SQLX_OFFLINE: "false"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/lcov.info
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Start server
        run: npm run start &
        env:
          PORT: 3000
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run Playwright e2e tests
        run: npx playwright test tests/e2e/phase13a.spec.ts --project=tablet-chrome
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

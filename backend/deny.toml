# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny any crate with a known security vulnerability.
version = 2
yanked = "warn"

[licenses]
version = 2
# Allow our own private workspace crates (UNLICENSED = proprietary).
unlicensed = "allow"
# Acceptable open-source licenses for this project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]

[bans]
# Prevent multiple versions of the same crate when possible.
multiple-versions = "warn"
# Deny wildcard dep specs (security risk: accepts any version).
wildcards = "deny"

[sources]
# Only allow crates from crates.io (no unknown registries or git sources in prod).
unknown-registry = "deny"
unknown-git = "warn"

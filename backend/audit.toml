# cargo-audit configuration
# https://docs.rs/cargo-audit/latest/cargo_audit/
#
# Transitive-dep advisories we cannot fix directly — same set as deny.toml.
# Each entry is documented with the blocking dep so we can act when a fix ships.

[advisories]
ignore = [
    # idna: Punycode label issue — transitive via `url`; fix = upgrade idna to >=1.0.0
    "RUSTSEC-2024-0421",
    # proc-macro-error: unmaintained — transitive via derive macros
    "RUSTSEC-2024-0370",
    # rustls-pemfile: unmaintained — transitive via rustls
    "RUSTSEC-2025-0134",
    # tokio-tar: PAX header smuggling — transitive via testcontainers (dev-only)
    "RUSTSEC-2025-0111",
    # rustls-webpki: URI name constraints — transitive via rustls
    "RUSTSEC-2026-0098",
    # rustls-webpki: wildcard name constraints — transitive via rustls
    "RUSTSEC-2026-0099",
    # rustls-webpki: CRL parsing panic — transitive via rustls
    "RUSTSEC-2026-0104",
]
